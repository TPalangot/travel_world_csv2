<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Completed Trips</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='completed_trip.css') }}">
</head>
<body>

<nav class="navbar">
    <ul>
        <li><a href="{{ url_for('dashboard') }}">Home</a></li>
        <li><a href="{{ url_for('stateorcountry') }}">Discover Destinations</a></li>
        <li><a href="{{ url_for('stateorcountry', type='national') }}">National</a></li>
        <li><a href="{{ url_for('stateorcountry', type='international') }}">International</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="{{ url_for('logout') }}">Logout</a></li>
    </ul>
</nav>

<div class="container">
    <h1>My Completed Trips</h1>
    <div class="top-buttons">
        <button class="add-btn" onclick="openAddForm()">+ Add Completed Trip</button>
        <button class="back-btn" onclick="goBack()">← Back</button>
    </div>
    <div class="search-container">
        <input type="text" id="searchTrip" oninput="liveSearchTrips()" placeholder="Search...">
        <button onclick="searchTrips()">Search</button>
    </div>
    <div id="tripsContainer" class="trips-container"></div>
</div>

<!-- Add Trip Form Modal -->
<div id="addTripModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeAddForm()">&times;</span>
        <h2>Add Completed Trip</h2>

        <form id="tripForm">
            <!-- Trip Title -->
            <div class="form-group">
                <label>Trip Title *</label>
                <input type="text" id="tripTitle" required>
            </div>

            <!-- Trip Cover Image -->
            <div class="form-group">
                <label>Trip Cover Image</label>
                <input type="file" id="titleImage" accept="image/*">
                <small>Upload a cover photo for your trip (optional)</small>
            </div>

            <!-- Visit Date -->
            <div class="form-group">
                <label>Date of Visit *</label>
                <input type="date" id="visitDate" required>
            </div>

            <!-- Budget -->
            <div class="form-group">
                <label>Budget</label>
                <input type="text" id="budget" placeholder="e.g., ₹50,000">
            </div>

            <!-- Google Drive Link -->
            <div class="form-group">
                <label>Google Drive Photo Link</label>
                <input type="url" id="googleDriveLink" placeholder="https://drive.google.com/...">
                <small>Share the Google Drive link where you stored your trip photos</small>
            </div>

            <!-- Experience -->
            <div class="form-group">
                <label>Experience</label>
                <textarea id="experience" rows="4" placeholder="Describe your experience and memories from this trip..."></textarea>
            </div>

            <!-- Places Visited -->
            <div class="form-group">
                <label>Places Visited *</label>
                <div id="placesContainer">
                    <select class="place-select" required>
                        <option value="">-- Select a place --</option>
                        {% for place in places %}
                        <option value="{{ place.id }}">{{ place.name }} ({{ place.destination_name }})</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="button" class="add-more-btn" onclick="addPlaceSelect()">+ Add More Place</button>
            </div>

            <!-- People Met -->
            <div class="form-group">
                <label>People Met</label>
                <div id="peopleContainer">
                    <div class="person-input-group">
                        <input type="text" class="person-name" placeholder="Name">
                        <input type="text" class="person-contact" placeholder="Contact (Phone)">
                        <input type="email" class="person-email" placeholder="Email (Optional)">
                        <input type="file" class="person-image" accept="image/*" placeholder="Photo (Optional)">
                    </div>
                </div>
                <button type="button" class="add-more-btn" onclick="addPersonInput()">+ Add More Person</button>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Save Trip</button>
        </form>
    </div>
</div>

<!-- Image Preview Modal -->
<div id="imageModal" class="image-modal" style="display:none;">
    <span class="close-image-modal" onclick="closeImageModal()">&times;</span>
    <img class="image-modal-content" id="modalImg" src="" alt="Person Photo">
</div>

<script>
// ================= LOAD COMPLETED TRIPS =================
function loadTrips() {
    fetch("{{ url_for('get_completed_trips') }}")
        .then(response => response.json())
        .then(trips => {
            window.allTrips = trips; // <-- Add this line
            displayTrips(trips);
        });
}

// ================= DISPLAY TRIPS =================
function displayTrips(trips) {
    const tripsContainer = document.getElementById('tripsContainer');
    tripsContainer.innerHTML = '';
    if (trips.length === 0) {
        tripsContainer.innerHTML = '<p>No completed trips found.</p>';
        return;
    }
    trips.forEach(trip => {
        const div = document.createElement('div');
        div.className = 'trip-card';
        const imgHtml = trip.images
            ? `<img src="/static/uploads/${trip.images}" alt="Trip Cover" class="trip-cover-image" style="max-width:200px;max-height:150px;margin-bottom:10px;">`
            : '';
        const linkHtml = trip.google_drive_link
            ? `<p><strong>Photos:</strong> <a href="${trip.google_drive_link}" target="_blank">View on Google Drive</a></p>`
            : '';
        let peopleHtml = '';
        if (trip.persons) {
            try {
                const people = JSON.parse(trip.persons);
                if (Array.isArray(people) && people.length > 0) {
                    peopleHtml = '<div><strong>People Met:</strong><ul>';
                    people.forEach(person => {
                        peopleHtml += `<li>
                            ${person.image ? `<img src="/static/uploads/${person.image}" alt="Person" style="width:40px;height:40px;border-radius:50%;vertical-align:middle;margin-right:8px;">` : ''}
                            <span>${person.name || ''}</span>
                            ${person.contact ? ` | ${person.contact}` : ''}
                            ${person.email ? ` | ${person.email}` : ''}
                        </li>`;
                    });
                    peopleHtml += '</ul></div>';
                }
            } catch (e) {}
        }
        placesHtml = '';
        if (trip.places && trip.places.length > 0) {
            placesHtml = `<div><strong>Places Visited:</strong> `;
            placesHtml += trip.places.map(place =>
                `<span>${place.name || ""}${place.destination_name ? " (" + place.destination_name + ")" : ""}</span>`
            ).join(", ");
            placesHtml += `</div>`;
        }
        div.innerHTML = `
    ${imgHtml}
    <h3>${trip.title}</h3>
    <p><strong>Date:</strong> ${trip.visit_date}</p>
    <p><strong>Budget:</strong> ${trip.budget || 'N/A'}</p>
    ${(() => {
        if (trip.description && trip.description.split(' ').length > 20) {
            return `
            <p><strong>Description:</strong>
                <span class="short-desc">
                    ${trip.description.split(' ').slice(0, 20).join(' ')}...
                    <a href="javascript:void(0);" class="read-more" onclick="showFullDesc(this)">Read more</a>
                </span>
                <span class="full-desc" style="display:none;">
                    ${trip.description}
                    <a href="javascript:void(0);" class="read-less" onclick="hideFullDesc(this)">Read less</a>
                </span>
            </p>
            `;
        } else {
            return `<p><strong>Description:</strong> ${trip.description || ''}</p>`;
        }
    })()}
    ${linkHtml}
    ${placesHtml}
    ${peopleHtml}
    <button class="delete-btn" onclick="deleteTrip('${trip.id}')">Delete</button>
`;
        tripsContainer.appendChild(div);
    });
}

// ================= OPEN ADD FORM =================
function openAddForm() {
    document.getElementById("addTripModal").style.display = "block";
}

// ================= CLOSE ADD FORM =================
function closeAddForm() {
    document.getElementById("addTripModal").style.display = "none";
    document.getElementById("tripForm").reset();
    resetFormInputs();
}

// ================= RESET FORM INPUTS =================
function resetFormInputs() {
    document.getElementById("placesContainer").innerHTML = `
        <select class="place-select" required>
            <option value="">-- Select a place --</option>
            {% for place in places %}
            <option value="{{ place.id }}">{{ place.name }} ({{ place.destination_name }})</option>
            {% endfor %}
        </select>
    `;
    document.getElementById("peopleContainer").innerHTML = `
        <div class="person-input-group">
            <input type="text" class="person-name" placeholder="Name">
            <input type="text" class="person-contact" placeholder="Contact (Phone)">
            <input type="email" class="person-email" placeholder="Email (Optional)">
            <input type="file" class="person-image" accept="image/*" placeholder="Photo (Optional)">
        </div>
    `;
}

// ================= ADD PLACE SELECT =================
function addPlaceSelect() {
    const container = document.getElementById("placesContainer");
    const select = document.createElement("select");
    select.className = "place-select";
    select.innerHTML = `
        <option value="">-- Select a place --</option>
        {% for place in places %}
        <option value="{{ place.id }}">{{ place.name }} ({{ place.destination_name }})</option>
        {% endfor %}
    `;
    container.appendChild(select);
}

// ================= ADD PERSON INPUT =================
function addPersonInput() {
    const container = document.getElementById("peopleContainer");
    const div = document.createElement("div");
    div.className = "person-input-group";
    div.innerHTML = `
        <input type="text" class="person-name" placeholder="Name">
        <input type="text" class="person-contact" placeholder="Contact (Phone)">
        <input type="email" class="person-email" placeholder="Email (Optional)">
        <input type="file" class="person-image" accept="image/*" placeholder="Photo (Optional)">
    `;
    container.appendChild(div);
}

// ================= SAVE TRIP =================
document.getElementById("tripForm").addEventListener("submit", function(e) {
    e.preventDefault();

    // Collect places (IDs from select)
    const placeSelects = document.querySelectorAll(".place-select");
    const places = Array.from(placeSelects)
        .map(select => select.value)
        .filter(val => val);

    if (places.length === 0) {
        alert("Please select at least one place!");
        return;
    }

    // Create FormData for file uploads
    const formData = new FormData();
    formData.append("title", document.getElementById("tripTitle").value);
    formData.append("visit_date", document.getElementById("visitDate").value);
    formData.append("budget", document.getElementById("budget").value);
    formData.append("experience", document.getElementById("experience").value);
    formData.append("google_drive_link", document.getElementById("googleDriveLink").value);

    // Add title image if provided
    const titleImageInput = document.getElementById("titleImage");
    if (titleImageInput.files.length > 0) {
        formData.append("title_image", titleImageInput.files[0]);
    }

    // Add places
    places.forEach(place => {
        formData.append("places", place);
    });

    // Collect people
    const personGroups = document.querySelectorAll(".person-input-group");
    formData.append("people_count", personGroups.length);

    personGroups.forEach((group, idx) => {
        const name = group.querySelector(".person-name").value;
        if (name.trim()) {  // Only add if name exists
            formData.append(`people_name_${idx}`, name);
            formData.append(`people_contact_${idx}`, group.querySelector(".person-contact").value);
            formData.append(`people_email_${idx}`, group.querySelector(".person-email").value);
            
            const imageInput = group.querySelector(".person-image");
            if (imageInput.files.length > 0) {
                formData.append(`people_image_${idx}`, imageInput.files[0]);
            }
        }
    });

    fetch("{{ url_for('save_completed_trip') }}", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("Trip saved successfully!");
            closeAddForm();
            loadTrips();
        } else {
            alert("Error: " + data.message);
        }
    })
    .catch(err => console.error("Error saving trip:", err));
});

// ================= DELETE TRIP =================
function deleteTrip(tripId) {
    if (confirm("Are you sure you want to delete this trip?")) {
        fetch("{{ url_for('delete_completed_trip') }}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ trip_id: tripId })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("Trip deleted successfully!");
                loadTrips();
            } else {
                alert("Error: " + data.message);
            }
        })
        .catch(err => console.error("Error deleting trip:", err));
    }
}

// ================= SEARCH TRIPS =================
let debounceTimer;

function liveSearchTrips() {
    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(() => {
        const query = document.getElementById("searchTrip").value.toLowerCase();

        const filtered = window.allTrips.filter(trip => {
            // Match trip title
            const titleMatch = trip.title &&
                trip.title.toLowerCase().includes(query);

            // Match state/destination
            const stateMatch = trip.places && trip.places.some(
                place => place.destination_name &&
                place.destination_name.toLowerCase().includes(query)
            );

            // ✅ Match place name
            const placeMatch = trip.places && trip.places.some(
                place => place.name &&
                place.name.toLowerCase().includes(query)
            );

            return titleMatch || stateMatch || placeMatch;
        });

        displayTrips(filtered);
    }, 300);
}

// ================= GO BACK =================
function goBack() {
    window.location.href = "{{ url_for('trip_type') }}";
}

// ================= CLOSE MODAL ON OUTSIDE CLICK =================
window.onclick = function(event) {
    const modal = document.getElementById("addTripModal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
}

// ================= INITIAL LOAD =================
loadTrips();

// ================= ENLARGE IMAGE =================
function enlargeImage(src) {
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");
    modalImg.src = src;
    modal.style.display = "flex";
}
function closeImageModal() {
    document.getElementById("imageModal").style.display = "none";
}

// ================= SHOW FULL DESCRIPTION =================
function showFullDesc(link) {
    const shortDesc = link.closest('.short-desc');
    const fullDesc = shortDesc.nextElementSibling;
    shortDesc.style.display = 'none';
    fullDesc.style.display = '';
}
function hideFullDesc(link) {
    const fullDesc = link.closest('.full-desc');
    const shortDesc = fullDesc.previousElementSibling;
    fullDesc.style.display = 'none';
    shortDesc.style.display = '';
}

</script>

</body>
</html>
